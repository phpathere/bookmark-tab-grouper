<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tab Bookmark Grouper main popup interface</title>
  <desc id="desc">A professional store screenshot showing the extension popup with bookmark folder selection, group by domain, and session controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b9f6ca"/>
      <stop offset="0.55" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="14" stdDeviation="0" flood-color="#1c1917" flood-opacity="1"/>
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="104" cy="112" r="88" fill="#fef08a" opacity="0.68"/>
  <circle cx="1138" cy="678" r="168" fill="#111827" opacity="0.13"/>

  <g transform="translate(96 92)">
    <text x="0" y="64" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#1c1917">Tab Bookmark</text>
    <text x="0" y="124" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#1c1917">Grouper</text>
    <rect x="0" y="154" width="430" height="8" fill="#1c1917"/>
    <text x="0" y="214" font-family="Courier New, monospace" font-size="28" font-weight="700" fill="#334155">Open bookmark folders into</text>
    <text x="0" y="254" font-family="Courier New, monospace" font-size="28" font-weight="700" fill="#334155">organized tab groups.</text>

    <g transform="translate(0 330)">
      <rect x="0" y="0" width="170" height="58" rx="10" fill="#fb7185" stroke="#1c1917" stroke-width="5"/>
      <text x="85" y="38" text-anchor="middle" font-family="Courier New, monospace" font-size="22" font-weight="900" fill="#ffffff">1-CLICK</text>
      <rect x="196" y="0" width="238" height="58" rx="10" fill="#38bdf8" stroke="#1c1917" stroke-width="5"/>
      <text x="315" y="38" text-anchor="middle" font-family="Courier New, monospace" font-size="22" font-weight="900" fill="#1c1917">DOMAIN GROUP</text>
      <rect x="460" y="0" width="150" height="58" rx="10" fill="#a78bfa" stroke="#1c1917" stroke-width="5"/>
      <text x="535" y="38" text-anchor="middle" font-family="Courier New, monospace" font-size="22" font-weight="900" fill="#1c1917">OFFLINE</text>
    </g>
  </g>

  <g transform="translate(736 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="650" rx="8" fill="#d1fae5" stroke="#1c1917" stroke-width="6"/>
    <rect x="22" y="22" width="376" height="606" fill="none" stroke="#1c1917" stroke-width="6"/>
    <path d="M22 36 L28 30 L34 36 L40 30 L46 36 L52 30 L58 36 L64 30 L70 36 L76 30 L82 36 L88 30 L94 36 L100 30 L106 36 L112 30 L118 36 L124 30 L130 36 L136 30 L142 36 L148 30 L154 36 L160 30 L166 36 L172 30 L178 36 L184 30 L190 36 L196 30 L202 36 L208 30 L214 36 L220 30 L226 36 L232 30 L238 36 L244 30 L250 36 L256 30 L262 36 L268 30 L274 36 L280 30 L286 36 L292 30 L298 36 L304 30 L310 36 L316 30 L322 36 L328 30 L334 36 L340 30 L346 36 L352 30 L358 36 L364 30 L370 36 L376 30 L382 36 L398 36" fill="none" stroke="#1c1917" stroke-width="3"/>

    <g transform="translate(70 78)" fill="#1c1917">
      <rect x="0" y="22" width="8" height="8"/>
      <rect x="8" y="14" width="8" height="8"/>
      <rect x="16" y="22" width="8" height="8"/>
      <rect x="24" y="30" width="8" height="8"/>
      <rect x="32" y="22" width="8" height="8"/>
      <rect x="40" y="14" width="8" height="8"/>
      <rect x="48" y="22" width="8" height="8"/>
      <rect x="8" y="38" width="8" height="8"/>
      <rect x="40" y="38" width="8" height="8"/>
      <rect x="16" y="46" width="24" height="8"/>
    </g>
    <text x="128" y="130" font-family="Courier New, monospace" font-size="18" font-weight="900" fill="#1c1917">TAB BOOKMARK GROUPER</text>
    <rect x="334" y="70" width="50" height="50" fill="#ffffff" stroke="#1c1917" stroke-width="5"/>
    <text x="359" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#1c1917">⚙</text>
    <rect x="70" y="178" width="300" height="6" fill="#1c1917"/>
    <rect x="70" y="218" width="300" height="48" fill="#ffffff" stroke="#1c1917" stroke-width="5"/>
    <text x="220" y="249" text-anchor="middle" font-family="Courier New, monospace" font-size="20" font-weight="900" fill="#1c1917">Current: 51 tab | 5 group</text>
    <rect x="70" y="292" width="300" height="68" fill="#38bdf8" stroke="#1c1917" stroke-width="5"/>
    <text x="220" y="335" text-anchor="middle" font-family="Courier New, monospace" font-size="24" font-weight="900" fill="#1c1917">GROUP BY DOMAIN</text>
    <text x="70" y="404" font-family="Courier New, monospace" font-size="21" font-weight="900" fill="#1c1917">SELECT BOOKMARKS FOLDER:</text>
    <rect x="70" y="430" width="300" height="70" fill="#ffffff" stroke="#1c1917" stroke-width="5"/>
    <text x="220" y="474" text-anchor="middle" font-family="Courier New, monospace" font-size="22" font-weight="900" fill="#1c1917">-- Choose a folder --</text>
    <path d="M340 458 L356 458 L348 476 Z" fill="#1c1917"/>
    <rect x="70" y="536" width="300" height="78" fill="#fb7185" stroke="#1c1917" stroke-width="5"/>
    <text x="220" y="585" text-anchor="middle" font-family="Courier New, monospace" font-size="27" font-weight="900" fill="#ffffff">OPEN &amp; GROUP TABS</text>
  </g>
</svg>
