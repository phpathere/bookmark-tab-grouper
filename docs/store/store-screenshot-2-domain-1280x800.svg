<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tab Bookmark Grouper domain grouping screenshot</title>
  <desc id="desc">A professional store screenshot showing tabs grouped by domain and sorted alphabetically, with the extension button changed to undo mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#99f6e4"/>
      <stop offset="0.5" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="12" stdDeviation="0" flood-color="#1c1917" flood-opacity="1"/>
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="1138" cy="128" r="96" fill="#fde68a" opacity="0.62"/>
  <circle cx="132" cy="660" r="154" fill="#111827" opacity="0.12"/>

  <g transform="translate(78 86)">
