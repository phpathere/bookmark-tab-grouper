    <text x="0" y="202" font-family="Courier New, monospace" font-size="25" font-weight="700" fill="#334155">Related tabs stay together.</text>
    <text x="0" y="238" font-family="Courier New, monospace" font-size="25" font-weight="700" fill="#334155">Sorted alphabetically.</text>

    <g transform="translate(0 292)">
