<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Tab Bookmark Grouper marquee promotional image</title>
  <desc id="desc">A polished neo-brutalist pixel marquee banner for Tab Bookmark Grouper.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d1fae5"/>
      <stop offset="0.5" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="12" dy="12" stdDeviation="0" flood-color="#1c1917" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>
  <circle cx="126" cy="96" r="96" fill="#fef08a" opacity="0.55"/>
  <circle cx="1260" cy="464" r="150" fill="#fb7185" opacity="0.24"/>

  <g transform="translate(70 68)">
    <rect x="0" y="0" width="560" height="424" rx="28" fill="#f8fafc" stroke="#1c1917" stroke-width="7" filter="url(#shadow)"/>
    <rect x="42" y="46" width="216" height="188" rx="14" fill="#ffffff" stroke="#1c1917" stroke-width="6"/>
    <rect x="70" y="82" width="160" height="24" rx="6" fill="#fb7185" stroke="#1c1917" stroke-width="4"/>
    <rect x="70" y="132" width="160" height="24" rx="6" fill="#38bdf8" stroke="#1c1917" stroke-width="4"/>
    <rect x="70" y="182" width="160" height="24" rx="6" fill="#a78bfa" stroke="#1c1917" stroke-width="4"/>

