      <g transform="translate(34 24) scale(5.5)" fill="#1c1917">
        <path d="M2 0h1v1H2zm6 0h1v1H8zM3 1h1v1H3zm4 0h1v1H7zM2 2h7v1H2zM1 3h2v1H1zm3 0h3v1H4zm4 0h2v1H8zM0 4h11v1H0zM0 5h1v1H0zm2 0h7v1H2zm8 0h1v1H10zM0 6h1v1H0zm2 0h1v1H2zm6 0h1v1H8zm2 0h1v1H10zM3 7h2v1H3zm3 0h2v1H6z"/>
      </g>
    </g>

    <g transform="translate(300 154)">
      <rect x="0" y="0" width="190" height="44" rx="14" fill="#fb7185" stroke="#1c1917" stroke-width="5"/>
      <rect x="24" y="17" width="116" height="10" rx="5" fill="#ffffff"/>
      <rect x="-44" y="72" width="220" height="44" rx="14" fill="#38bdf8" stroke="#1c1917" stroke-width="5"/>
      <rect x="-20" y="89" width="130" height="10" rx="5" fill="#ffffff"/>
      <rect x="0" y="144" width="174" height="44" rx="14" fill="#a78bfa" stroke="#1c1917" stroke-width="5"/>
      <rect x="24" y="161" width="96" height="10" rx="5" fill="#ffffff"/>
    </g>
  </g>

  <g transform="translate(720 122)">
