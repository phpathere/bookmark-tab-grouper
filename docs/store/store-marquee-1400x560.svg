    <text x="0" y="70" font-family="Menlo, SFMono-Regular, monospace" font-size="58" font-weight="900" fill="#1c1917">Grouper</text>
    <path d="M0 102h454" stroke="#1c1917" stroke-width="8" stroke-dasharray="18 14" stroke-linecap="square"/>
    <text x="0" y="164" font-family="Menlo, SFMono-Regular, monospace" font-size="30" font-weight="800" fill="#334155">Open bookmarks into organized</text>
    <text x="0" y="204" font-family="Menlo, SFMono-Regular, monospace" font-size="30" font-weight="800" fill="#334155">Chrome tab groups.</text>

