<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body style="visibility: hidden;">
  <div class="glass-container">
    <div class="header">
      <div class="header-left">
        <div class="logo" aria-hidden="true">
          <!-- Custom Royalty-Free SVG Alien -->
          <svg viewBox="0 0 11 8" width="22" height="16" fill="currentColor">
            <path d="M2 0h1v1H2zm6 0h1v1H8zM3 1h1v1H3zm4 0h1v1H7zM2 2h7v1H2zM1 3h2v1H1zm3 0h3v1H4zm4 0h2v1H8zM0 4h11v1H0zM0 5h1v1H0zm2 0h7v1H2zm8 0h1v1H10zM0 6h1v1H0zm2 0h1v1H2zm6 0h1v1H8zm2 0h1v1H10zM3 7h2v1H3zm3 0h2v1H6z"/>
          </svg>
        </div>
        <h1 data-i18n="popupTitle">Bookmark Grouper</h1>
      </div>
      <button class="settings-btn" id="settingsBtn" type="button" title="Settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    
    <div id="statsBar" class="stats-bar">
      <!-- Injected via JS -->
    </div>
    
    <div class="content">
      <div class="toolbar-right">
        <div class="dropdown-container">
          <button id="sortMenuBtn" class="icon-btn" type="button" title="Sort/Group Tabs" aria-label="Sort or group tabs" aria-haspopup="true" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></svg>
          </button>
          <div id="sortDropdown" class="dropdown-content hidden">
            <button id="groupByDomainBtn" class="dropdown-item" data-i18n="groupByWebsite">Nhóm theo trang web</button>
            <button id="undoGroupBtn" class="dropdown-item" data-i18n="undoGroup">Mặc định lại (Undo)</button>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label for="folderSelect" data-i18n="selectFolderLabel">Select Folder:</label>
        <div class="select-wrapper">
          <select id="folderSelect">
            <option value="" disabled selected data-i18n="defaultOption">-- Choose a folder --</option>
          </select>
        </div>
      </div>

      <button id="actionBtn" class="primary-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        <span data-i18n="openGroupBtn">Open & Group</span>
      </button>

      <div class="session-actions">
        <button id="exportBtn" class="secondary-btn">
          <span data-i18n="exportSession">Export Session</span>
        </button>
        <button id="importBtn" class="secondary-btn" style="background: #a78bfa;">
          <span data-i18n="importSession">Import Session</span>
        </button>
        <input type="file" id="importFile" accept=".btg" style="display: none;">
      </div>

      <div id="statusMessage" class="status hidden"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <!-- UI Icons provided by Lucide (https://lucide.dev) under ISC License -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <h2 id="settingsTitle" data-i18n="settingsTitle">Settings</h2>
      
      <div class="form-group">
        <label for="themeSelect" data-i18n="themeLabel">Theme:</label>
        <div class="select-wrapper">
          <select id="themeSelect">
            <option value="auto" data-i18n="autoTheme">Auto (System)</option>
            <option value="light" data-i18n="lightTheme">Light</option>
            <option value="dark" data-i18n="darkTheme">Dark</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="langSelect" data-i18n="languageLabel">Language:</label>
        <div class="select-wrapper">
          <select id="langSelect">
            <option value="auto" data-i18n="autoLang">Auto (System)</option>
            <option value="vi">Tiếng Việt</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div style="display: flex; gap: 8px; margin-top: 16px;">
        <button id="resetSettingsBtn" class="secondary-btn" style="flex: 1; border-color: var(--error-color); color: var(--error-color);">
          <span data-i18n="resetDefaultsBtn">Reset to Defaults</span>
        </button>
        <button id="closeSettingsBtn" class="primary-btn" style="flex: 1;">
          <span data-i18n="closeBtn">Close</span>
        </button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="importConfirmModal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="importConfirmTitle">
      <h2 id="importConfirmTitle" data-i18n="importConfirmTitle">Import Session?</h2>
      <p id="importConfirmSummary" class="modal-summary"></p>
      <div class="modal-actions">
        <button id="cancelImportBtn" class="secondary-btn" type="button">
          <span data-i18n="cancelBtn">Cancel</span>
        </button>
        <button id="confirmImportBtn" class="primary-btn" type="button">
          <span data-i18n="confirmImportBtn">Import</span>
        </button>
      </div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
