<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Bookmark Tab Grouper</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier Prime', Courier, monospace;
      background-color: #d1fae5;
      background-image: radial-gradient(#1c1917 10%, transparent 10%);
      background-size: 20px 20px;
      color: #1c1917;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .container {
      background: #ffffff;
      border: 6px solid #1c1917;
      box-shadow: 12px 12px 0px #1c1917;
      padding: 40px;
      max-width: 600px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      margin-top: 0;
      border-bottom: 4px dashed #1c1917;
      padding-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      font-weight: bold;
    }

    .author {
      margin-top: 40px;
      font-size: 16px;
      background: #fb7185;
      display: inline-block;
      padding: 8px 16px;
      border: 3px solid #1c1917;
      box-shadow: 4px 4px 0px #1c1917;
      font-weight: 900;
    }

    .btn {
      display: inline-block;
      margin-top: 32px;
      background: #38bdf8;
      color: #1c1917;
      text-decoration: none;
      border: 4px solid #1c1917;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 6px 6px 0px #1c1917;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0px #1c1917;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 11 8" width="80" height="60" fill="#1c1917" style="margin-bottom: 20px;">
      <path d="M2 0h1v1H2zm6 0h1v1H8zM3 1h1v1H3zm4 0h1v1H7zM2 2h7v1H2zM1 3h2v1H1zm3 0h3v1H4zm4 0h2v1H8zM0 4h11v1H0zM0 5h1v1H0zm2 0h7v1H2zm8 0h1v1H10zM0 6h1v1H0zm2 0h1v1H2zm6 0h1v1H8zm2 0h1v1H10zM3 7h2v1H3zm3 0h2v1H6z"/>
    </svg>
    
    <h1 data-i18n="welcomeTitle"></h1>
    
    <p data-i18n="welcomeP1"></p>
    <p data-i18n="welcomeP2"></p>
    <p data-i18n="welcomeP3"></p>
    
    <div class="author" data-i18n="welcomeAuthor"></div>
    <br>
    
    <a href="#" class="btn" id="btnClose" data-i18n="welcomeStartBtn"></a>
  </div>
  <script src="welcome.js"></script>
</body>
</html>
